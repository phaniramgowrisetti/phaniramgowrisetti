<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="100%" role="img" aria-label="Terminal window illustration" preserveAspectRatio="xMidYMid meet">
  <title>Terminal — PR//WORKSPACE</title>
  <desc>Minimal terminal window illustration — GitHub Dark theme, monospace text.</desc>

  <!-- Window background (transparent outer, inner dark window) -->
  <rect x="40" y="40" width="820" height="460" rx="12" fill="#0D1117" stroke="#30363D" stroke-width="2" />

  <!-- Window controls (top-left) -->
  <g transform="translate(64,62)">
    <circle cx="0" cy="0" r="8" fill="#FF5F56" />
    <circle cx="28" cy="0" r="8" fill="#FFBD2E" />
    <circle cx="56" cy="0" r="8" fill="#3FB950" />
  </g>

  <!-- Content area: monospace text -->
  <g transform="translate(84,120)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, 'Roboto Mono', 'Segoe UI Mono', monospace" font-size="20" fill="#E6EDF3" text-anchor="start">
    <text x="0" y="0">&gt; whoami</text>
    <text x="0" y="32" fill="#A855F7">PHANI RAM</text>

    <text x="0" y="72">&gt; pwd</text>
    <text x="0" y="104" fill="#22D3EE">PR//WORKSPACE</text>

    <text x="0" y="144">&gt; stack</text>
    <text x="24" y="176">HTML</text>
    <text x="24" y="208">CSS</text>
    <text x="24" y="240">JavaScript</text>
    <text x="24" y="272">Python</text>
    <text x="24" y="304">Flask</text>

    <text x="0" y="344">&gt; status</text>
    <text x="0" y="376" fill="#3FB950">Building awesome projects...</text>

    <!-- static blinking-style block cursor at end of last line -->
    <rect x="296" y="356" width="18" height="24" fill="#A855F7" rx="2" />
  </g>

</svg>
