<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1600" height="500" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Colors -->
    <linearGradient id="scanGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.0" />
      <stop offset="45%" stop-color="#22D3EE" stop-opacity="0.25" />
      <stop offset="55%" stop-color="#A855F7" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#00FF9C" stop-opacity="0.0" />
    </linearGradient>

    <linearGradient id="glowGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="50%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#00FF9C" />
    </linearGradient>

    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#22D3EE" stroke-opacity="0.06" stroke-width="1" />
    </pattern>

    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="gblur" />
      <feMerge>
        <feMergeNode in="gblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <mask id="fadeMask">
      <rect x="0" y="0" width="1600" height="500" fill="url(#scanGrad)" />
    </mask>

    <style><![CDATA[
      .title { font-family: Inter, Roboto, Arial, sans-serif; font-weight: 800; fill: #F8FAFC; font-size:72px; letter-spacing:1px }
      .subtitle { font-family: Inter, Roboto, Arial, sans-serif; font-weight:600; fill:#A855F7; font-size:22px }
      .meta { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; fill:#F8FAFC; font-size:14px; opacity:0.85 }
      .terminal { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; font-size:16px; fill:#22D3EE }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="#0D1117" />

  <!-- Thin neon border -->
  <rect x="4" y="4" width="1592" height="492" rx="10" fill="none" stroke="url(#glowGrad)" stroke-opacity="0.08" stroke-width="2" />

  <!-- Moving grid -->
  <rect width="1600" height="500" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="40 0" dur="16s" repeatCount="indefinite" />
  </rect>

  <!-- Floating particles (20, lightweight) -->
  <g opacity="0.9">
    <circle cx="120" cy="520" r="1.6" fill="#22D3EE" opacity="0.85">
      <animate attributeName="cy" values="540;420;360" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.85;0" dur="12s" repeatCount="indefinite" />
    </circle>
    <circle cx="220" cy="520" r="1.2" fill="#A855F7" opacity="0.7">
      <animate attributeName="cy" values="540;430;360" dur="14s" repeatCount="indefinite" begin="0.8s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="14s" repeatCount="indefinite" begin="0.8s" />
    </circle>
    <circle cx="320" cy="520" r="1.8" fill="#00FF9C" opacity="0.8">
      <animate attributeName="cy" values="540;430;340" dur="11s" repeatCount="indefinite" begin="1.2s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="11s" repeatCount="indefinite" begin="1.2s" />
    </circle>
    <circle cx="420" cy="520" r="1.4" fill="#A855F7" opacity="0.7">
      <animate attributeName="cy" values="540;440;360" dur="9s" repeatCount="indefinite" begin="0.5s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="9s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    <circle cx="520" cy="520" r="1.1" fill="#22D3EE" opacity="0.7">
      <animate attributeName="cy" values="540;440;380" dur="10s" repeatCount="indefinite" begin="1.7s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="10s" repeatCount="indefinite" begin="1.7s" />
    </circle>
    <circle cx="620" cy="520" r="1.6" fill="#00FF9C" opacity="0.8">
      <animate attributeName="cy" values="560;420;340" dur="13s" repeatCount="indefinite" begin="0.4s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="13s" repeatCount="indefinite" begin="0.4s" />
    </circle>
    <circle cx="720" cy="520" r="1.3" fill="#A855F7" opacity="0.75">
      <animate attributeName="cy" values="540;430;350" dur="12s" repeatCount="indefinite" begin="0.9s" />
      <animate attributeName="opacity" values="0;0.75;0" dur="12s" repeatCount="indefinite" begin="0.9s" />
    </circle>
    <circle cx="820" cy="520" r="1.9" fill="#22D3EE" opacity="0.85">
      <animate attributeName="cy" values="560;440;360" dur="11s" repeatCount="indefinite" begin="2.1s" />
      <animate attributeName="opacity" values="0;0.85;0" dur="11s" repeatCount="indefinite" begin="2.1s" />
    </circle>
    <circle cx="920" cy="520" r="1.2" fill="#00FF9C" opacity="0.7">
      <animate attributeName="cy" values="540;430;360" dur="9.8s" repeatCount="indefinite" begin="1.1s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="9.8s" repeatCount="indefinite" begin="1.1s" />
    </circle>
    <circle cx="1020" cy="520" r="1.5" fill="#A855F7" opacity="0.72">
      <animate attributeName="cy" values="540;420;360" dur="13.2s" repeatCount="indefinite" begin="0.6s" />
      <animate attributeName="opacity" values="0;0.72;0" dur="13.2s" repeatCount="indefinite" begin="0.6s" />
    </circle>
    <circle cx="1120" cy="520" r="1.0" fill="#22D3EE" opacity="0.66">
      <animate attributeName="cy" values="540;450;380" dur="8.6s" repeatCount="indefinite" begin="0.2s" />
      <animate attributeName="opacity" values="0;0.66;0" dur="8.6s" repeatCount="indefinite" begin="0.2s" />
    </circle>
    <circle cx="1220" cy="520" r="1.8" fill="#00FF9C" opacity="0.8">
      <animate attributeName="cy" values="560;430;320" dur="14s" repeatCount="indefinite" begin="1.9s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="14s" repeatCount="indefinite" begin="1.9s" />
    </circle>
    <circle cx="1320" cy="520" r="1.3" fill="#A855F7" opacity="0.7">
      <animate attributeName="cy" values="540;420;360" dur="10.5s" repeatCount="indefinite" begin="1.3s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="10.5s" repeatCount="indefinite" begin="1.3s" />
    </circle>
    <circle cx="1420" cy="520" r="1.4" fill="#22D3EE" opacity="0.75">
      <animate attributeName="cy" values="540;430;360" dur="11.7s" repeatCount="indefinite" begin="0.7s" />
      <animate attributeName="opacity" values="0;0.75;0" dur="11.7s" repeatCount="indefinite" begin="0.7s" />
    </circle>
    <circle cx="1520" cy="520" r="1.1" fill="#00FF9C" opacity="0.65">
      <animate attributeName="cy" values="540;440;360" dur="9.4s" repeatCount="indefinite" begin="2.0s" />
      <animate attributeName="opacity" values="0;0.65;0" dur="9.4s" repeatCount="indefinite" begin="2.0s" />
    </circle>
    <circle cx="420" cy="480" r="2.2" fill="#A855F7" opacity="0.85">
      <animate attributeName="cy" values="520;420;360" dur="15s" repeatCount="indefinite" begin="0.1s" />
      <animate attributeName="opacity" values="0;0.85;0" dur="15s" repeatCount="indefinite" begin="0.1s" />
    </circle>
    <circle cx="860" cy="460" r="1.9" fill="#22D3EE" opacity="0.9">
      <animate attributeName="cy" values="520;420;360" dur="12.6s" repeatCount="indefinite" begin="0.3s" />
      <animate attributeName="opacity" values="0;0.9;0" dur="12.6s" repeatCount="indefinite" begin="0.3s" />
    </circle>
    <circle cx="1260" cy="500" r="1.6" fill="#00FF9C" opacity="0.8">
      <animate attributeName="cy" values="540;430;360" dur="13.4s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="13.4s" repeatCount="indefinite" begin="1.5s" />
    </circle>
    <circle cx="150" cy="460" r="1.2" fill="#A855F7" opacity="0.7">
      <animate attributeName="cy" values="520;430;350" dur="10.2s" repeatCount="indefinite" begin="0.6s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="10.2s" repeatCount="indefinite" begin="0.6s" />
    </circle>
    <circle cx="560" cy="480" r="1.3" fill="#22D3EE" opacity="0.75">
      <animate attributeName="cy" values="540;430;360" dur="12.9s" repeatCount="indefinite" begin="1.1s" />
      <animate attributeName="opacity" values="0;0.75;0" dur="12.9s" repeatCount="indefinite" begin="1.1s" />
    </circle>
    <circle cx="980" cy="470" r="1.0" fill="#00FF9C" opacity="0.65">
      <animate attributeName="cy" values="540;430;360" dur="9.6s" repeatCount="indefinite" begin="0.9s" />
      <animate attributeName="opacity" values="0;0.65;0" dur="9.6s" repeatCount="indefinite" begin="0.9s" />
    </circle>
  </g>

  <!-- HUD circles (rotating slowly) -->
  <g transform="translate(400,250)" filter="url(#neon)" opacity="0.95">
    <g id="hud">
      <circle cx="0" cy="0" r="90" fill="none" stroke="#A855F7" stroke-width="1.8" stroke-opacity="0.35" />
      <circle cx="0" cy="0" r="140" fill="none" stroke="#22D3EE" stroke-width="1.2" stroke-opacity="0.20" />
      <circle cx="0" cy="0" r="200" fill="none" stroke="#00FF9C" stroke-width="1" stroke-opacity="0.12" />
      <path d="M -90 0 L -60 0" stroke="#A855F7" stroke-width="2" stroke-linecap="round" />
    </g>
    <animateTransform xlink:href="#hud" attributeName="transform" type="rotate" from="0" to="360" dur="36s" repeatCount="indefinite" />
  </g>

  <!-- Corner interface elements -->
  <g opacity="0.9">
    <rect x="20" y="20" width="120" height="60" rx="6" fill="#071021" stroke="#22D3EE" stroke-opacity="0.12" />
    <!-- PR logo inside top-left HUD -->
    <g transform="translate(32,32)">
      <rect x="0" y="0" width="40" height="36" rx="6" fill="#071021" stroke="#A855F7" stroke-opacity="0.16" />
      <text x="20" y="24" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Roboto, Arial" font-weight="700" font-size="16">PR</text>
    </g>
    <rect x="1460" y="20" width="120" height="60" rx="6" fill="#071021" stroke="#A855F7" stroke-opacity="0.12" />
    <g transform="translate(1468,28)">
      <rect x="0" y="0" width="12" height="4" rx="1" fill="#A855F7" />
      <rect x="0" y="10" width="8" height="3" rx="1" fill="#22D3EE" />
    </g>
    <!-- GitHub connected label -->
    <g transform="translate(1400,28)">
      <text x="60" y="16" font-family="Inter, Roboto, Arial" font-size="12" fill="#F8FAFC" opacity="0.95">GitHub</text>
      <text x="60" y="32" font-family="Inter, Roboto, Arial" font-size="12" fill="#00FF9C" opacity="0.95">CONNECTED ●</text>
    </g>
  </g>

  <!-- Terminal panel -->
  <g transform="translate(820,120)">
    <rect x="0" y="0" width="640" height="260" rx="10" fill="#071021" stroke="#22D3EE" stroke-opacity="0.12" />
    <g transform="translate(20,22)">
      <!-- developer workspace logs -->
      <text class="terminal" x="0" y="0">[ OK ] Initializing workspace</text>
      <text class="terminal" x="0" y="22">[ OK ] Loading React</text>
      <text class="terminal" x="0" y="44">[ OK ] Loading Node.js</text>
      <text class="terminal" x="0" y="66">[ OK ] Connecting GitHub</text>
      <text class="terminal" x="0" y="88">[ OK ] Syncing repositories</text>
      <text class="terminal" x="0" y="110">[ OK ] Open Source modules loaded</text>
      <text class="terminal" x="0" y="132">[ OK ] Development environment ready</text>

      <!-- prompt + blinking block cursor -->
      <g transform="translate(0,160)">
        <text class="terminal" x="0" y="0">&gt; phani@github:~$ </text>
        <rect x="170" y="-14" width="12" height="18" fill="#F8FAFC" opacity="1">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
        </rect>
      </g>

      <!-- animated progress bar (0% -> 100%) -->
      <g transform="translate(0,190)">
        <rect x="0" y="6" width="600" height="8" rx="4" fill="#061119" stroke="#22D3EE" stroke-opacity="0.08" />
        <rect id="prog" x="0" y="6" width="0" height="8" rx="4" fill="#22D3EE" opacity="0.95">
          <animate attributeName="width" from="0" to="600" dur="2.4s" fill="freeze" begin="0s" />
        </rect>
        <text id="pct" class="meta" x="610" y="12">100%</text>
      </g>
    </g>
  </g>

  <!-- Scan line -->
  <g opacity="0.85">
    <!-- primary scanning line (vertical sweep) -->
    <rect x="-200" y="-60" width="2000" height="6" fill="url(#scanGrad)">
      <animate attributeName="y" from="-120" to="520" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.9;0" dur="6s" repeatCount="indefinite" />
    </rect>
    <!-- secondary subtle horizontal shimmer -->
    <rect x="0" y="0" width="1600" height="500" fill="none" pointer-events="none">
      <animate attributeName="opacity" values="0;0.02;0" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Title and subtitle -->
  <g transform="translate(120,120)" filter="url(#softGlow)">
    <!-- main title (white) -->
    <text class="title" x="0" y="0">PHANI RAM</text>
    <!-- subtle purple outer stroke for soft glow -->
    <text x="0" y="0" font-family="Inter, Roboto, Arial, sans-serif" font-weight="800" font-size="72px" fill="none" stroke="#A855F7" stroke-opacity="0.22" stroke-width="2" letter-spacing="1px">PHANI RAM</text>
    <!-- cyan highlight (small) -->
    <text x="2" y="2" font-family="Inter, Roboto, Arial, sans-serif" font-weight="800" font-size="72px" fill="none" stroke="#22D3EE" stroke-opacity="0.12" stroke-width="1" letter-spacing="1px">PHANI RAM</text>

    <!-- Two-line subtitle -->
    <text class="subtitle" x="0" y="100">FULL STACK developer</text>
    <text class="subtitle" x="0" y="132">Open Source Contributor</text>

    <!-- Tech stack line -->
    <text x="0" y="158" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" font-size="14px" fill="#22D3EE" opacity="0.95">React • Node.js • Express • MongoDB • Python</text>
  </g>

  <!-- Pulsing neon underline -->
  <g transform="translate(120,146)">
    <rect x="0" y="6" width="420" height="4" rx="2" fill="url(#glowGrad)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="x" values="0;8;0" dur="3.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Small status block left -->
  <g transform="translate(120,200)" opacity="0.95">
    <rect x="0" y="0" width="260" height="80" rx="8" fill="#071021" stroke="#A855F7" stroke-opacity="0.08" />
    <text class="meta" x="16" y="22">BUILD : 2026.07.21</text>
    <text class="meta" x="16" y="44">RELEASE : v2.0.0</text>
    <text class="meta" x="16" y="66">STATUS : ONLINE</text>
  </g>

  <!-- Decorative neon lines near title -->
  <g transform="translate(560,80)" opacity="0.9">
    <rect x="0" y="0" width="320" height="2" fill="#22D3EE">
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="0" y="8" width="200" height="2" fill="#A855F7" opacity="0.35">
      <animate attributeName="x" values="0;8;0" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Subtle vignette -->
  <radialGradient id="vign" cx="50%" cy="40%">
    <stop offset="0%" stop-color="#000" stop-opacity="0" />
    <stop offset="100%" stop-color="#000" stop-opacity="0.35" />
  </radialGradient>
  <rect width="1600" height="500" fill="url(#vign)" opacity="0.12" />

</svg>